<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Studies — Exam Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --bg:#0a0a14;
  --bg2:#0f0f1f;
  --glass:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.12);
  --purple:#a855f7;
  --blue:#38bdf8;
  --green:#34d399;
  --red:#f87171;
  --text:#e8e8f5;
  --text-dim:#9999b3;
}
*{box-sizing:border-box;}
body{
  margin:0;font-family:'Inter',sans-serif;background:
  radial-gradient(circle at 20% 10%, #1b1033 0%, transparent 45%),
  radial-gradient(circle at 80% 0%, #0a2b3d 0%, transparent 40%),
  var(--bg);
  color:var(--text);min-height:100vh;
}
.glass{
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(14px);
  border-radius:18px;
  box-shadow:0 8px 32px rgba(0,0,0,0.35);
}
header{padding:18px 22px;position:sticky;top:0;z-index:50;
  background:rgba(10,10,20,0.75);backdrop-filter:blur(16px);

.header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.logo{font-weight:800;font-size:20px;background:linear-gradient(90deg,var(--purple),var(--blue));
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.countdown{font-size:13px;color:var(--text-dim);text-align:right;}
.countdown b{color:var(--blue);font-size:15px;}
.progress-wrap{height:8px;border-radius:6px;background:rgba(255,255,255,0.08);margin-top:12px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:6px;transition:width .4s;}
nav{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.tab{padding:9px 14px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600;
  border:1px solid var(--glass-border);color:var(--text-dim);background:rgba(255,255,255,0.03);transition:.2s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{background:linear-gradient(90deg,var(--purple),var(--blue));color:#fff;border-color:transparent;}
main{max-width:1200px;margin:0 auto;padding:24px 18px 80px;display:flex;gap:20px;align-items:flex-start;}
.content{flex:1;min-width:0;}
.sidebar{width:300px;flex-shrink:0;position:sticky;top:160px;max-height:75vh;overflow-y:auto;}
@media(max-width:900px){main{flex-direction:column;}.sidebar{width:100%;position:relative;top:0;max-height:none;}}
.section{display:none;animation:fadein .35s;}
.section.active{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card{padding:20px;margin-bottom:18px;}
h2{margin:0 0 6px;font-size:20px;}
.sub{color:var(--text-dim);font-size:13px;margin-bottom:16px;}
button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:13px;
  background:linear-gradient(90deg,var(--purple),var(--blue));color:#fff;transition:.2s;}
button:hover{filter:brightness(1.15);transform:translateY(-1px);}
button.secondary{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--glass-border);}
textarea,input[type=text]{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);border-radius:10px;
  color:var(--text);padding:10px 12px;font-family:inherit;font-size:14px;resize:vertical;
}
textarea:focus,input:focus{outline:none;border-color:var(--purple);}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px;}
.topic-box{padding:16px;border-radius:14px;background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);

.field-label{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin:14px 0 4px;font-weight:700;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-left:8px;}
.badge.green{background:rgba(52,211,153,0.18);color:var(--green);}
.badge.blue{background:rgba(56,189,248,0.18);color:var(--blue);}
.highlight{background:rgba(52,211,153,0.35);color:#fff;border-radius:4px;padding:1px 3px;}
.flash{margin-top:12px;padding:10px 14px;border-radius:10px;font-weight:700;font-size:14px;display:none;}
.flash.ok{background:rgba(52,211,153,0.15);color:var(--green);display:block;}
.flash.bad{background:rgba(248,113,113,0.15);color:var(--red);display:block;}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.stat{flex:1;min-width:110px;padding:12px;border-radius:12px;background:rgba(255,255,255,0.04);text-align:center;}
.stat .num{font-size:22px;font-weight:800;color:var(--blue);}
.stat .lbl{font-size:11px;color:var(--text-dim);}
.def-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:650px){.def-grid{grid-template-columns:1fr;}}
.match-item{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);
  cursor:pointer;font-size:13px;transition:.15s;}
.match-item:hover{border-color:var(--purple);}
.match-item.selected{border-color:var(--blue);background:rgba(56,189,248,0.15);}
.match-item.correct{border-color:var(--green);background:rgba(52,211,153,0.18);}
.match-item.wrong{border-color:var(--red);background:rgba(248,113,113,0.18);}
.swipe-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;}
.swipe-card{width:100%;max-width:380px;height:220px;perspective:1200px;cursor:pointer;touch-action:pan-y;}
.swipe-inner{position:relative;width:100%;height:100%;transition:transform .45s;transform-style:preserve-3d;}
.swipe-card.flipped .swipe-inner{transform:rotateY(180deg);}
.swipe-face{position:absolute;width:100%;height:100%;border-radius:20px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:18px;backface-visibility:hidden;text-align:center;border:1px solid var(--glass-border);}
.swipe-front{background:linear-gradient(160deg,rgba(168,85,247,0.18),rgba(56,189,248,0.1));}
.swipe-front .term{font-size:26px;font-weight:800;}
.swipe-front .type-tag{margin-top:10px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);}
.swipe-back{background:linear-gradient(160deg,rgba(56,189,248,0.18),rgba(168,85,247,0.1));transform:rotateY(180deg);}
.swipe-back .ru{font-size:20px;font-weight:800;color:var(--blue);margin-bottom:10px;}
.swipe-back .ex{font-size:13px;color:var(--text);}
.swipe-controls{display:flex;align-items:center;gap:14px;}
.swipe-controls button{padding:10px 16px;font-size:18px;}
.swipe-counter{font-size:13px;color:var(--text-dim);min-width:70px;text-align:center;}
.deck-filter{display:flex;gap:8px;margin-bottom:14px;}
.deck-filter .tab{padding:6px 12px;font-size:12px;}
.save-list{font-size:12px;}
.save-item{padding:8px 10px;border-radius:8px;margin-bottom:6px;background:rgba(255,255,255,0.04);}
.save-item b{color:var(--purple);}
.save-item span{display:block;color:var(--text-dim);font-size:11px;}
.search-box{margin-bottom:10px;}
.essay-struct div{margin-bottom:10px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.04);}
.essay-struct b{color:var(--blue);}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:8px;}

<script>

// Example sentences for synonym drill — show the weak word in context.
const SYN_EXAMPLES = {

  .concat(ACADEMIC_VERBS.map(w=>({term:w[0],ru:w[1],type:"verb"})));

// Combined swipeable deck: linking words + academic verbs, each with RU translation + example.
const DECK = LINKING_WORDS.map(([term,ru,ex])=>({term,ru,ex,type:"связка"}))
  .concat(ACADEMIC_VERBS.map(([term,ru,ex])=>({term,ru,ex,type:"глагол"})));

const ESSAY_STRUCTURE = [
["Introduction","Rephrase the question + provide a clear thesis statement responding directly to it."],
["Body Paragraphs","Topic sentence → theory → explanation → example → explicit link back to the thesis."],
["Conclusion","Summarize the key argument and restate the thesis. No new content."]
];

/* ======================= STATE / STORAGE ======================= */
const STORE_KEY = "msExamApp_v1";
function loadState(){
  try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};}
}
let state = Object.assign({
  topicsCompleted:[],
  synScore:0,synTotal:0,
  matchScore:0,matchTotal:0,
  gapScore:0,gapTotal:0,
  learnedCards:[]
}, loadState());
function save(){localStorage.setItem(STORE_KEY, JSON.stringify(state));}

const PRAISE = ["Excellent!","Brilliant!","You're ready!","Sharp answer!","Nailed it!","Great work!"];
function praise(){return PRAISE[Math.floor(Math.random()*PRAISE.length)];}

/* ======================= COUNTDOWN ======================= */
function updateCountdown(){
  const target = new Date("2026-06-25T00:00:00").getTime();
  const now = Date.now();
  const diff = target - now;
  const el = document.getElementById("countdownText");
  if(diff<=0){el.textContent="Экзамен уже сегодня!";return;}
  const d=Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000),
        m=Math.floor(diff%3600000/60000), s=Math.floor(diff%60000/1000);
  el.textContent = `${d}d ${h}h ${m}m ${s}s`;
}
setInterval(updateCountdown,1000); updateCountdown();

/* ======================= PROGRESS ======================= */
function updateOverallProgress(){
  const parts = [
    Math.min(state.topicsCompleted.length/20,1),
    state.synTotal? state.synScore/Math.max(state.synTotal,20):0,
    state.matchTotal? Math.min(state.matchScore/20,1):0,
    state.gapTotal? Math.min(state.gapScore/20,1):0,
    Math.min(state.learnedCards.length/DECK.length,1)
  ];
  const pct = Math.round(parts.reduce((a,b)=>a+b,0)/parts.length*100);
  document.getElementById("overallProgress").style.width = pct+"%";
}

    <h2>Подбери синоним</h2>

    <div class="row">
      <button id="nextWeakBtn" class="secondary">Следующее слово</button>
      <button id="checkSynBtn">Проверить</button>
    </div>

  function nextWord(){
    const keys = Object.keys(SYNONYMS);
    currentWeak = keys[Math.floor(Math.random()*keys.length)];
    document.getElementById("weakWordBox").textContent = currentWeak.toUpperCase();
    const ex = SYN_EXAMPLES[currentWeak] || "";
    document.getElementById("weakWordExample").innerHTML = ex ? "Пример: " + ex.replace("___", `<b>${currentWeak}</b>`) : "";

/* ======================= FEATURE 3: VOCAB MATCH ======================= */
function renderF3(){
  const el = document.getElementById("f3");
  const words = Object.keys(VOCAB);
  // pick a random subset of 10 for one round
  const shuffled = [...words].sort(()=>Math.random()-0.5).slice(0,10);
  const defs = shuffled.map(w=>VOCAB[w]).sort(()=>Math.random()-0.5);
  el.innerHTML = `
  <div class="card glass">
    <h2>Найди пару (Vocabulary Drill)</h2>
    <div class="sub">Кликни на слово, потом на его определение.</div>
    <div class="stat-row">
      <div class="stat"><div class="num" id="matchScoreNum">${state.matchScore}</div><div class="lbl">Правильно</div></div>
      <div class="stat"><div class="num" id="matchTotalNum">${state.matchTotal}</div><div class="lbl">Попыток</div></div>
    </div>
    <div class="def-grid">
      <div id="wordCol"></div>
      <div id="defCol"></div>
    </div>
    <div class="row"><button id="newRoundBtn" class="secondary">Новый раунд</button></div>
    <div class="flash" id="matchFlash"></div>
  </div>`;
  const wordCol = document.getElementById("wordCol");
  const defCol = document.getElementById("defCol");
  let selectedWord = null;
  let matchedWords = new Set();

  shuffled.forEach(w=>{
    const d = document.createElement("div");
    d.className="match-item"; d.textContent=w; d.dataset.word=w;
    d.onclick=()=>{
      if(matchedWords.has(w)) return;
      document.querySelectorAll("#wordCol .match-item").forEach(x=>x.classList.remove("selected"));
      d.classList.add("selected"); selectedWord = w;
    };
    wordCol.appendChild(d);
  });
  defs.forEach(def=>{
    const d = document.createElement("div");
    d.className="match-item"; d.textContent=def; d.dataset.def=def;
    d.onclick=()=>{
      if(!selectedWord) return;
      state.matchTotal++;
      const correctDef = VOCAB[selectedWord];
      const wordEl = document.querySelector(`#wordCol .match-item[data-word="${selectedWord.replace(/"/g,'\\"')}"]`);
      if(def===correctDef){
        state.matchScore++;
        d.classList.add("correct"); wordEl.classList.add("correct");
        matchedWords.add(selectedWord);
        d.onclick=null;
      } else {
        d.classList.add("wrong"); setTimeout(()=>d.classList.remove("wrong"),600);
        wordEl.classList.add("wrong"); setTimeout(()=>wordEl.classList.remove("wrong"),600);
      }
      selectedWord=null;
      document.querySelectorAll("#wordCol .match-item").forEach(x=>x.classList.remove("selected"));
      save();
      document.getElementById("matchScoreNum").textContent=state.matchScore;
      document.getElementById("matchTotalNum").textContent=state.matchTotal;
      const f=document.getElementById("matchFlash");
      f.className="flash "+(def===correctDef?"ok":"bad");
      f.textContent = def===correctDef? praise() : "Не та пара — попробуй ещё.";
      updateOverallProgress();
    };
    defCol.appendChild(d);
  });
  document.getElementById("newRoundBtn").onclick = renderF3;
}

/* ======================= FEATURE 5: SWIPEABLE FLASHCARDS ======================= */
let deckOrder = DECK.map((_,i)=>i);
let deckIndex = 0;
let deckFilter = "all";

function getFilteredOrder(){
  if(deckFilter==="all") return DECK.map((_,i)=>i);
  return DECK.map((_,i)=>i).filter(i=>DECK[i].type===deckFilter);
}

function renderF5(){
  const el = document.getElementById("f5");
  deckOrder = getFilteredOrder();
  if(deckIndex>=deckOrder.length) deckIndex=0;
  el.innerHTML = `
  <div class="card glass">
    <h2>Карточки: связки и глаголы (Flashcards)</h2>
    <div class="sub">Кликни на карточку, чтобы перевернуть и увидеть перевод + пример. Свайпай ← → или жми кнопки.</div>
    <div class="stat-row">
      <div class="stat"><div class="num" id="learnedNum">${state.learnedCards.length}</div><div class="lbl">Выучено</div></div>
      <div class="stat"><div class="num">${DECK.length}</div><div class="lbl">Всего карточек</div></div>
    </div>
    <div class="deck-filter">
      <div class="tab ${deckFilter==='all'?'active':''}" data-f="all">Все</div>
      <div class="tab ${deckFilter==='связка'?'active':''}" data-f="связка">Связки</div>
      <div class="tab ${deckFilter==='глагол'?'active':''}" data-f="глагол">Глаголы</div>
    </div>
    <div class="swipe-wrap">
      <div class="swipe-card" id="swipeCard">
        <div class="swipe-inner" id="swipeInner">
          <div class="swipe-face swipe-front">
            <div class="term" id="swipeTerm"></div>
            <div class="type-tag" id="swipeType"></div>
          </div>
          <div class="swipe-face swipe-back">
            <div class="ru" id="swipeRu"></div>
            <div class="ex" id="swipeEx"></div>
          </div>
        </div>
      </div>
      <div class="swipe-controls">
        <button id="prevCardBtn" class="secondary">←</button>
        <button id="learnBtn">${"⭐ Выучено"}</button>
        <button id="nextCardBtn" class="secondary">→</button>
      </div>
      <div class="swipe-counter" id="swipeCounter"></div>
      <button id="resetCardsBtn" class="secondary" style="margin-top:4px;">Сбросить прогресс</button>
    </div>
  </div>`;

  el.querySelectorAll(".deck-filter .tab").forEach(t=>{
    t.onclick = ()=>{ deckFilter = t.dataset.f; deckIndex=0; renderF5(); };
  });

  function showCard(){
    const card = document.getElementById("swipeCard");
    card.classList.remove("flipped");
    const item = DECK[deckOrder[deckIndex]];
    document.getElementById("swipeTerm").textContent = item.term;
    document.getElementById("swipeType").textContent = item.type;
    document.getElementById("swipeRu").textContent = item.ru;
    document.getElementById("swipeEx").textContent = item.ex;
    document.getElementById("swipeCounter").textContent = (deckIndex+1)+" / "+deckOrder.length;
    const learned = state.learnedCards.includes(item.term);
    document.getElementById("learnBtn").textContent = learned ? "✅ В выученных" : "⭐ Отметить выученным";
  }

  document.getElementById("swipeCard").onclick = ()=>{
    document.getElementById("swipeCard").classList.toggle("flipped");
  };
  document.getElementById("prevCardBtn").onclick = ()=>{
    deckIndex = (deckIndex-1+deckOrder.length)%deckOrder.length; showCard();
  };
  document.getElementById("nextCardBtn").onclick = ()=>{
    deckIndex = (deckIndex+1)%deckOrder.length; showCard();
  };
  document.getElementById("learnBtn").onclick = ()=>{
    const item = DECK[deckOrder[deckIndex]];
    const idx = state.learnedCards.indexOf(item.term);
    if(idx>=0) state.learnedCards.splice(idx,1); else state.learnedCards.push(item.term);
    save();
    document.getElementById("learnedNum").textContent = state.learnedCards.length;
    showCard();
    updateOverallProgress();
  };
  document.getElementById("resetCardsBtn").onclick = ()=>{
    state.learnedCards = []; save(); showCard();
    document.getElementById("learnedNum").textContent = state.learnedCards.length;
    updateOverallProgress();
  };

  // touch swipe support
  let touchStartX = null;
  const cardEl = document.getElementById("swipeCard");
  cardEl.addEventListener("touchstart", e=>{ touchStartX = e.touches[0].clientX; }, {passive:true});
  cardEl.addEventListener("touchend", e=>{
    if(touchStartX===null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx)>40){
      if(dx<0){ deckIndex=(deckIndex+1)%deckOrder.length; } else { deckIndex=(deckIndex-1+deckOrder.length)%deckOrder.length; }
      showCard();
    }
    touchStartX=null;
  }, {passive:true});

  showCard();
}
